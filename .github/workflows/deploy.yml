name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: app
        run: pnpm build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -R app/dist/. _site/
          for dir in blockly material-go-playground physics zachetka-frontend-test; do
            if [ -d "$dir" ]; then
              cp -R "$dir" "_site/$dir"
            fi
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
