name: Deploy to Cloudflare Pages

# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id
# The Pages project must be named "eeff" with production branch "master".
# Attach the custom domain eeff.io to the project in the Cloudflare dashboard.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: app
        run: pnpm build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -R app/dist/. _site/
          for dir in blockly material-go-playground physics zachetka-frontend-test; do
            if [ -d "$dir" ]; then
              cp -R "$dir" "_site/$dir"
            fi
          done

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=eeff --branch=master
